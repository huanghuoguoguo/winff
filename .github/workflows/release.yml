name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd client && npm install
          cd ../server && npm install --production

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Test build
        run: |
          ls -la server/public/

      # Linux 发布包
      - name: Create Linux release package
        run: |
          mkdir -p winff-linux
          cp -r server winff-linux/
          cp install.sh winff-linux/
          tar -czvf winff-linux.tar.gz winff-linux/

      # Windows 发布包
      - name: Create Windows release package
        shell: pwsh
        run: |
          Compress-Archive -Path server/,install.ps1 -DestinationPath winff-windows.zip -Force

      # 上传到 Release
      - name: Upload Linux release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: winff-linux.tar.gz
          asset_name: winff-linux.tar.gz
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload Windows release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: winff-windows.zip
          asset_name: winff-windows.zip
          tag: ${{ github.ref }}
          overwrite: true

  publish-install-script:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install.sh
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: install.sh
          asset_name: install.sh
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload install.ps1
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: install.ps1
          asset_name: install.ps1
          tag: ${{ github.ref }}
          overwrite: true
